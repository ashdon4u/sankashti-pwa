<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1a1033" />
<title>Sankashti Chaturthi — Moonrise</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
  :root { --bg:#0f0820; --bg2:#1a1033; --fg:#f5e9ff; --muted:#b6a6d4; --accent:#ffcf6b; }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: radial-gradient(circle at 50% 0%, var(--bg2), var(--bg) 70%); color: var(--fg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; min-height:100vh; }
  main { max-width: 520px; margin: 0 auto; padding: 24px 20px 80px; }
  h1 { font-size: 1.35rem; margin: 0 0 4px; font-weight: 600; }
  .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }
  .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
  .label { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .value { font-size: 1.6rem; font-weight: 600; color: var(--accent); }
  .date-big { font-size: 1.2rem; font-weight: 600; }
  .loc { font-size: 0.9rem; color: var(--muted); }
  button { background: var(--accent); color: #2a1a00; border: 0; border-radius: 10px; padding: 12px 18px; font-weight: 600; font-size: 1rem; cursor: pointer; width: 100%; }
  button.secondary { background: transparent; color: var(--fg); border: 1px solid rgba(255,255,255,0.2); }
  .row { display: flex; gap: 10px; margin-top: 10px; }
  .upcoming li { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.08); list-style: none; display: flex; justify-content: space-between; font-size: 0.95rem; }
  .upcoming { padding: 0; margin: 8px 0 0; }
  .upcoming li:last-child { border: 0; }
  .muted { color: var(--muted); }
  .err { color: #ff9a9a; }
  .moon { font-size: 2.4rem; }
</style>
</head>
<body>
<main>
  <div class="moon" aria-hidden="true">🌙</div>
  <h1>Sankashti Chaturthi Moonrise</h1>
  <div class="sub">Break your fast at the right time, in your city.</div>

  <div class="card" id="nextCard">
    <div class="label">Next Sankashti Chaturthi</div>
    <div class="date-big" id="nextDate">—</div>
    <div class="label" style="margin-top:16px">Moonrise</div>
    <div class="value" id="moonTime">—</div>
    <div class="label" style="margin-top:14px">Chandra Darshan Muhurta <span style="text-transform:none;opacity:0.6">(moon ~8° above horizon)</span></div>
    <div class="value" id="darshanTime">—</div>
    <div class="loc" id="locLine">Location not set</div>
    <div class="row">
      <button id="locBtn">Use my location</button>
    </div>
    <div class="row">
      <button class="secondary" id="manualBtn">Enter city manually</button>
    </div>
    <div id="msg" class="sub" style="margin-top:10px"></div>
  </div>

  <div class="card">
    <div class="label">Upcoming dates</div>
    <div class="sub" style="font-size:0.75rem;margin:4px 0 0">Moonrise · Chandra Darshan</div>
    <ul class="upcoming" id="upcomingList"></ul>
  </div>

  <div class="sub" style="text-align:center;margin-top:20px">
    Times are approximate (±2 min). Verify with your local panchang.
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/suncalc@1.9.0/suncalc.min.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
  }
</script>
</body>
</html>
